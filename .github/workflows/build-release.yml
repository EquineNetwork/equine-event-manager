name: Build named plugin zip

# Every time code lands on `main`, build a clean, installable plugin zip and
# publish it to a GitHub Release so the repo's Releases page always has a
# correctly-named download:
#   * file name  -> equine-event-manager-<version>.zip   (name + current version)
#   * folder inside -> equine-event-manager/             (correct WordPress install folder)
# The dev-only files (tests, mockups, docs) are stripped automatically by the
# .gitattributes export-ignore rules, same as the local build.

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # 6.1: a real gate BEFORE the release build. `main` auto-deploys to the live site
  # via the in-WordPress updater, so a syntax-broken or smoke-failing main must NOT
  # produce an installable zip. build-zip `needs: verify`, so it only runs if this
  # passes. (The full WordPress smoke suite — needing a MySQL + seeded WP fixture —
  # lands as a follow-up per #55; this gates on what runs without a WP fixture.)
  verify:
    name: Verify (lint + JS + no-WP smokes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Lint all PHP files
        run: |
          set -euo pipefail
          find equine-event-manager.php includes admin public tests tools \
            -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check every JS file
        run: |
          set -euo pipefail
          for f in assets/js/*.js; do
            node --check "$f"
          done
      - name: Run standalone (no-WP) smokes
        run: |
          set -euo pipefail
          out=$(php tests/smoke/stall-map-sanitize-smoke.php)
          echo "$out"
          echo "$out" | grep -q ' 0 failed'

  build-zip:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read the plugin version from the header
        id: ver
        run: |
          VERSION=$(grep -m1 -E '^[[:space:]]*\*[[:space:]]*Version:' equine-event-manager.php \
            | sed -E 's/.*Version:[[:space:]]*//; s/[[:space:]]+$//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release for version: $VERSION"

      - name: Build the correctly-named zip
        run: |
          git archive --format=zip \
            --prefix=equine-event-manager/ \
            -o "equine-event-manager-${{ steps.ver.outputs.version }}.zip" \
            HEAD

      - name: Publish (or refresh) the release with the versioned asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          FILE="equine-event-manager-${{ steps.ver.outputs.version }}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$FILE" --clobber
          else
            gh release create "$TAG" "$FILE" \
              --title "$TAG" \
              --notes "Installable plugin zip. File is named with the version; the folder inside is \`equine-event-manager\`. Auto-built from main."
          fi
