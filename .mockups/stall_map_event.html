<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Stall Map — Customer (v4 mockup)</title>
<!--
  v4 Stall Mapping — CUSTOMER stall-map view (mockup).
  JUST the stall map — NOT the reservation form (that lives in event_page.html).
  Multi-barn: each barn tab fetches its own CSV (montcrief.csv, burnett.csv),
  the same per-tab data the real plugin pulls from each published barn tab.
  Conventions: number = stall, blank = aisle/gap, text = marked area (drag-fill
  the whole footprint → exact room via same-label rectangle merge).
  Customer states: Available / Selected / Taken / Unavailable.
  Mobile: full-screen; swipe to pan at a readable chip size — no pinch-zoom.
  NOTE: served via the preview server so the relative CSV fetches resolve.
-->
<style>
  :root{
    --navy:#031B4E; --ink:#18212f; --muted:#5f6f85; --line:#d9e2ec;
    --bg:#eef2f8; --surface:#fff; --electric:#2563EB; --electric-soft:#eaf0ff;
    --avail-border:#b9c6da; --reserved:#cbd5e1; --reserved-ink:#7c8ba0;
    --blocked:#9aa6b6; --land:#e8edf4; --land-ink:#6a7890;
    --chip:40px; --gap:4px; --radius:8px;
    font-family:"IBM Plex Sans","Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);display:flex;}
  h2{font-family:"Space Grotesk","IBM Plex Sans",sans-serif;margin:0;}
  .btn{appearance:none;border:0;border-radius:var(--radius);font-weight:700;font-size:14px;padding:11px 18px;cursor:pointer;}
  .btn-ghost{background:#eef2f7;color:var(--ink);}
  .btn-navy{background:var(--navy);color:#fff;}
  .map-view{background:#fff;margin:auto;width:min(1100px,96vw);height:min(92vh,920px);
    border-radius:14px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(8,15,30,.18);}
  .map-head{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line);}
  .map-head h2{font-size:17px;color:var(--navy);}
  .map-head .spacer{flex:1;}
  .map-close{appearance:none;border:0;background:#eef2f7;border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--ink);}
  .barn-tabs{display:flex;gap:4px;padding:10px 18px 0;flex-wrap:wrap;}
  .barn-tab{appearance:none;border:1px solid var(--line);border-bottom:0;background:#f6f9fd;color:var(--muted);font-weight:700;font-size:13px;padding:8px 14px;border-radius:8px 8px 0 0;cursor:pointer;}
  .barn-tab.active{background:#fff;color:var(--navy);box-shadow:inset 0 -2px 0 var(--electric);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .swatch{width:14px;height:14px;border-radius:4px;border:1px solid var(--line);display:inline-block;}
  .sw-avail{background:#fff;border-color:var(--avail-border);}
  .sw-sel{background:var(--electric);border-color:var(--electric);}
  .sw-res{background:var(--reserved);border-color:var(--reserved);}
  .sw-block{background:var(--blocked);border-color:var(--blocked);}
  .swipe-hint{display:none;font-size:12px;color:var(--muted);padding:6px 18px;background:#f6f9fd;border-bottom:1px solid var(--line);}
  .map-scroll{flex:1;overflow:auto;padding:18px;background:#fbfcfe;-webkit-overflow-scrolling:touch;}
  .map-grid{display:grid;gap:var(--gap);width:max-content;}
  .cell{width:var(--chip);height:var(--chip);}
  .stall{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid var(--avail-border);border-radius:5px;background:#fff;color:var(--navy);cursor:pointer;user-select:none;line-height:1;}
  .stall:hover{background:var(--electric-soft);border-color:var(--electric);}
  .stall.reserved{background:var(--reserved);border-color:var(--reserved);color:var(--reserved-ink);cursor:not-allowed;}
  .stall.blocked{background:repeating-linear-gradient(45deg,#9aa6b6,#9aa6b6 3px,#8593a5 3px,#8593a5 6px);border-color:var(--blocked);color:transparent;cursor:not-allowed;}
  .stall.selected{background:var(--electric);border-color:var(--electric);color:#fff;}
  .landmark{display:flex;align-items:center;justify-content:center;text-align:center;font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--land-ink);background:var(--land);border:1px dashed #c4cedd;border-radius:5px;padding:2px;line-height:1.1;}
  .map-foot{display:flex;align-items:center;gap:12px;padding:14px 18px;border-top:1px solid var(--line);background:#fff;}
  .map-foot .count{font-size:14px;flex:1;}
  .map-foot .count strong{color:var(--navy);}
  @media (max-width:680px){
    .map-view{width:100vw;height:100vh;max-height:100vh;border-radius:0;margin:0;}
    .map-scroll{padding:10px;}
    :root{--chip:44px;}
    .swipe-hint{display:block;}
  }
</style>
</head>
<body>
<div class="map-view">
  <div class="map-head">
    <h2>Choose Your Stalls</h2>
    <span class="spacer"></span>
    <button class="map-close" aria-label="Close">&times;</button>
  </div>
  <div class="barn-tabs" data-barn-tabs></div>
  <div class="legend">
    <span><i class="swatch sw-avail"></i> Available</span>
    <span><i class="swatch sw-sel"></i> Selected</span>
    <span><i class="swatch sw-res"></i> Taken</span>
    <span><i class="swatch sw-block"></i> Unavailable</span>
  </div>
  <div class="swipe-hint">Swipe to scroll the full map ←→ ↑↓</div>
  <div class="map-scroll"><div class="map-grid" data-map-grid></div></div>
  <div class="map-foot">
    <span class="count"><strong data-count>0</strong> selected — <span data-chosen-inline>none yet</span></span>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-navy">Done</button>
  </div>
</div>

<script>
var BARNS = ['Montcrief','Burnett'];   // each barn tab = its own published sheet tab
var grid = [];
var selected = {};

function parseGrid(csv){
  var rows = csv.replace(/\r/g,'').split('\n').map(function(line){ return line.split(','); });
  if(rows.length && rows[rows.length-1].length===1 && rows[rows.length-1][0]==='') rows.pop();
  var maxc = rows.reduce(function(m,r){ return Math.max(m,r.length); },0);
  return rows.map(function(r){
    var out=[];
    for(var c=0;c<maxc;c++){
      var v=(r[c]||'').trim();
      if(v==='') out.push({type:'gap',label:''});
      else if(/^\d+$/.test(v)||/^[A-Za-z]{0,3}-?\d+$/.test(v)) out.push({type:'stall',label:v});
      else out.push({type:'landmark',label:v});
    }
    return out;
  });
}
function seedStatus(label){
  var n=parseInt(String(label).replace(/\D/g,''),10)||0;
  var h=(n*2654435761)%97;
  if(h<24) return 'reserved';
  if(h===30) return 'blocked';
  return 'available';
}

/* explicit grid placement + same-label RECTANGLE merge (exact rooms) */
function renderGrid(){
  var host=document.querySelector('[data-map-grid]');
  var rows=grid.length, cols=grid[0]?grid[0].length:0;
  host.style.gridTemplateColumns='repeat('+cols+', var(--chip))';
  host.style.gridTemplateRows='repeat('+rows+', var(--chip))';
  host.innerHTML='';
  var used=grid.map(function(r){return r.map(function(){return false;});});
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      if(used[r][c]) continue;
      var cell=grid[r][c];
      if(cell.type==='gap'){ used[r][c]=true; continue; }
      if(cell.type==='stall'){
        used[r][c]=true;
        var s=document.createElement('div');
        var st=seedStatus(cell.label);
        s.className='cell stall '+(st==='available'?'':st);
        if(selected[cell.label]) s.classList.add('selected');
        s.textContent=cell.label;
        s.title='Stall '+cell.label+(st!=='available'?' ('+st+')':'');
        s.dataset.label=cell.label; s.dataset.status=st;
        s.style.gridColumn=(c+1); s.style.gridRow=(r+1);
        host.appendChild(s);
        continue;
      }
      var label=cell.label, w=1, h=1, ok=true;
      while(c+w<cols && grid[r][c+w].type==='landmark' && grid[r][c+w].label===label && !used[r][c+w]) w++;
      while(r+h<rows && ok){
        for(var k=0;k<w;k++){ var cc=grid[r+h][c+k]; if(!(cc.type==='landmark'&&cc.label===label&&!used[r+h][c+k])){ ok=false; break; } }
        if(ok) h++;
      }
      for(var i=0;i<h;i++) for(var j=0;j<w;j++) used[r+i][c+j]=true;
      var d=document.createElement('div');
      d.className='landmark';
      d.style.gridColumn=(c+1)+' / span '+w;
      d.style.gridRow=(r+1)+' / span '+h;
      d.textContent=label;
      host.appendChild(d);
    }
  }
}
function refreshSummary(){
  var labels=Object.keys(selected);
  document.querySelector('[data-count]').textContent=labels.length;
  document.querySelector('[data-chosen-inline]').textContent = labels.length? labels.join(', ') : 'none yet';
}
function loadBarn(name){
  return fetch('./'+name.toLowerCase()+'.csv').then(function(r){return r.text();}).then(function(csv){
    grid=parseGrid(csv); renderGrid();
  });
}

/* build barn tabs */
var tabHost=document.querySelector('[data-barn-tabs]');
BARNS.forEach(function(b,i){
  var t=document.createElement('button');
  t.className='barn-tab'+(i===0?' active':''); t.dataset.barn=b; t.textContent=b;
  tabHost.appendChild(t);
});
tabHost.addEventListener('click',function(ev){
  var t=ev.target.closest('.barn-tab'); if(!t) return;
  document.querySelectorAll('.barn-tab').forEach(function(b){b.classList.toggle('active',b===t);});
  loadBarn(t.dataset.barn);
});
document.querySelector('[data-map-grid]').addEventListener('click',function(ev){
  var s=ev.target.closest('.stall'); if(!s) return;
  if(s.dataset.status!=='available') return;
  var l=s.dataset.label;
  if(selected[l]){ delete selected[l]; s.classList.remove('selected'); }
  else { selected[l]=true; s.classList.add('selected'); }
  refreshSummary();
});

loadBarn('Montcrief');
</script>
</body>
</html>
